name: mushaf_app
description: An interactive offline Mushaf (Quran) application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.2
  path_provider: ^2.1.1
  path: ^1.8.3
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/db/quran_offline.db
  
  # QPC Hafs font - Official Uthmani Mushaf font from QUL.Tarteel
  # Downloaded from: https://qul.tarteel.ai/resources/font/245
  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs_V22.ttf
