name: mushaf_app
description: An interactive offline Mushaf (Quran) application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/db/quran_offline.db
  
  # Fonts are loaded from system (using fontFamilyFallback in code)
  # To use custom fonts, download Amiri and Scheherazade from Google Fonts
  # and place them in a fonts/ directory, then uncomment below:
  # fonts:
  #   - family: Amiri
  #     fonts:
  #       - asset: fonts/Amiri-Regular.ttf
  #       - asset: fonts/Amiri-Bold.ttf
  #         weight: 700
  #   - family: Scheherazade
  #     fonts:
  #       - asset: fonts/Scheherazade-Regular.ttf
  #       - asset: fonts/Scheherazade-Bold.ttf
  #         weight: 700
